{% extends "base.html" %}

{% block title %}Analyze{% endblock %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<div class="row justify-content-center">
    <div class="col-md-3">
<a href="{{ url_for('export') }}" class="btn btn-primary">Download CSV</a>
</div>
</div>
<form method="GET" action="{{ url_for('analyze') }}" class="mb-4">
    <div class="row justify-content-center">
        <div class="col-md-3">
            <label class="form-label">Month</label>
            <select name="month" class="form-select">
                <option value="all" {{ 'selected' if selected_month == 'all' }}>All Months</option>
                <option value="01" {{ 'selected' if selected_month == '01' }}>January</option>
                <option value="02" {{ 'selected' if selected_month == '02' }}>February</option>
                <option value="03" {{ 'selected' if selected_month == '03' }}>March</option>
                <option value="04" {{ 'selected' if selected_month == '04' }}>April</option>
                <option value="05" {{ 'selected' if selected_month == '05' }}>May</option>
                <option value="06" {{ 'selected' if selected_month == '06' }}>June</option>
                <option value="07" {{ 'selected' if selected_month == '07' }}>July</option>
                <option value="08" {{ 'selected' if selected_month == '08' }}>August</option>
                <option value="09" {{ 'selected' if selected_month == '09' }}>September</option>
                <option value="10" {{ 'selected' if selected_month == '10' }}>October</option>
                <option value="11" {{ 'selected' if selected_month == '11' }}>November</option>
                <option value="12" {{ 'selected' if selected_month == '12' }}>December</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Year</label>
            <select name="year" class="form-select">
                <option value="all" {{ 'selected' if selected_year == 'all' }}>All Years</option>
                <option value="2025" {{ 'selected' if selected_year == '2025' }}>2025</option>
                <option value="2026" {{ 'selected' if selected_year == '2026' }}>2026</option>
                <option value="2027" {{ 'selected' if selected_year == '2027' }}>2027</option>
            </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Filter</button>
        </div>
    </div>
</form>

<div class="row">
    <div class="col-md-6">
        <h5 class="text-center">Expenses</h5>
        <div style="height: 400px;">
            <canvas id="ExpensesDistribution"></canvas>
        </div>
    </div>
    <div class="col-md-6">
        <h5 class="text-center">Income</h5>
        <div style="height: 400px;">
            <canvas id="IncomeDistribution"></canvas>
        </div>
    </div>
</div>

<script>
    const categories = {{ categories | tojson }};
    const expenseData = {{ expense_data | tojson }};
    const incomeData = {{ income_data | tojson }};

    new Chart(document.getElementById('ExpensesDistribution'), {
        type: 'pie',
        data: {
            labels: categories,
            datasets: [{ label: 'Expenses', data: expenseData }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    new Chart(document.getElementById('IncomeDistribution'), {
        type: 'pie',
        data: {
            labels: categories,
            datasets: [{ label: 'Income', data: incomeData }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
</script>

{% endblock %}
