{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div style="width: 300px; height: 300px; margin: auto;">
<div>
  <canvas id="ExpensesDistribution"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const ctx = document.getElementById('ExpensesDistribution');

  new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Home', 'Work', 'Personal'],
        datasets: [{
            label: 'Expenses allocated',
            data: [{{ home_expense }}, {{ work_expense }}, {{ personal_expense }}],
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true
    }
});
</script>
    </div>

{% endblock %}
