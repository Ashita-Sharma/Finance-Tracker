{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1>Edit Profile</h1>
        <div class="row">
                <form method="POST">
                    <label for="email" class="form-label">E-Mail</label>
                    <input name="email" type="text" class="form-control" value="{{ user[0] }}" required>

                    <label for="username" class="form-label">Display Name</label>
                    <input name="username" type="text" class="form-control" value="{{ user[1] }}">

                    <label for="password" class="form-label">Enter Current Password</label>
                    <input name="password" type="password" class="form-control" id="password">

                    <label for="password" class="form-label">Enter New Password</label>
                    <input name="new_password" type="password" class="form-control" id="new_password">
                    <label for="password" class="form-label">Confirm New Password</label>
                    <input name="confirm_new_password" type="password" class="form-control" id="confirm_new_password">

                    <button type="submit" class="btn btn-primary mt-3">Save Changes</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-3">Cancel</a>
                </form>
            </div>
        </div>
        </div>
{% endblock %}
